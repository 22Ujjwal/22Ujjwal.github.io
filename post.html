    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="pub-light">
    <nav class="navbar">
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>

        <div class="nav-links" id="nav-links">

            <a href="index.html#contact">Contact</a>

        </div>
    </nav>

    <main class="pub-main">
        <article class="post-article" id="post-article">
            <p class="post-loading">Loading post…</p>
        </article>

        <div class="post-nav" id="post-nav" hidden>
            <a href="publications.html" class="back-link"><i class="fas fa-arrow-left"></i> ALL POSTS</a>
        </div>

        <section class="subscribe-box subscribe-bottom" id="post-subscribe" hidden>
            <div class="subscribe-copy">
                <h3>Get the next one in your inbox</h3>
                <p>Subscribe to Agentic Cover — new posts and conference coverage.</p>
            </div>
            <form class="subscribe-form" data-subscribe-form>
                <input type="email" name="email" placeholder="you@example.com" required aria-label="Email address">
                <button type="submit">Subscribe</button>
            </form>
            <p class="subscribe-status" data-subscribe-status role="status"></p>
        </section>
    </main>

    <footer>
