    <script>
        (function () {
            var btn = document.getElementById('contactBtn');
            if (!btn) return;
            btn.addEventListener('click', function (e) {
                var email = btn.getAttribute('data-email');
                var webUrl = btn.getAttribute('href');
                var ua = navigator.userAgent || '';
                var isIOS = /iPad|iPhone|iPod/.test(ua);
                var isAndroid = /Android/.test(ua);
                if (!isIOS && !isAndroid) return; // desktop: use default web href
                e.preventDefault();
                var appUrl = isAndroid
                    ? 'intent://co?to=' + email + '#Intent;scheme=googlegmail;package=com.google.android.gm;end'
                    : 'googlegmail://co?to=' + email;
                var fallback = setTimeout(function () {
                    window.location.href = webUrl;
                }, 1200);
                var onHide = function () {
                    clearTimeout(fallback);
                    document.removeEventListener('visibilitychange', onHide);
                };
                document.addEventListener('visibilitychange', onHide);
                window.location.href = appUrl;
            });
        })();
    </script>
